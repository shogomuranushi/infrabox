name: Build and push base image

on:
  push:
    branches: [main]
    paths:
      - "images/base/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infrabox-base

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: images/base
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ubuntu-24.04
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  replace-workers:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Rolling replace worker MIG via API node
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail
            gcloud compute instance-groups managed rolling-action replace \
              ${{ secrets.GCE_WORKER_MIG_NAME }} \
              --zone=${{ secrets.GCE_ZONE }} \
              --max-surge=1 \
              --max-unavailable=0
