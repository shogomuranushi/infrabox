name: Build, push, and deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "k8s/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infrabox-api
  CLUSTER_NAME: infrabox
  CLUSTER_ZONE: asia-northeast1-b
  DEPLOY_NAMESPACE: infrabox

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_ZONE }}
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Rollout restart
        run: kubectl rollout restart deployment/infrabox-api -n ${{ env.DEPLOY_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/infrabox-api -n ${{ env.DEPLOY_NAMESPACE }} --timeout=120s
