name: Deploy API to GCE

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "k8s/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/infrabox-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy k8s manifests to GCE
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "k8s/*"
          target: /tmp/infrabox-deploy
          overwrite: true

      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          envs: DOMAIN
          script: |
            set -euo pipefail

            # Pull new image from GHCR
            docker pull ghcr.io/${{ github.repository_owner }}/infrabox-api:${{ github.sha }}

            # Tag as latest for k3s
            docker tag ghcr.io/${{ github.repository_owner }}/infrabox-api:${{ github.sha }} infrabox-api:latest

            # Import into k3s containerd
            docker save infrabox-api:latest | sudo k3s ctr images import -

            # Substitute domain placeholders in k8s manifests
            cd /tmp/infrabox-deploy/k8s
            if [ -n "${DOMAIN:-}" ]; then
              sed -i "s|API_DOMAIN_PLACEHOLDER|api.${DOMAIN}|g" *.yaml
              sed -i "s|AUTH_DOMAIN_PLACEHOLDER|auth.${DOMAIN}|g" *.yaml
            fi

            # Apply k8s manifests
            sudo kubectl apply -f /tmp/infrabox-deploy/k8s/

            # Restart deployment to pick up new image
            sudo kubectl rollout restart deployment/infrabox-api -n infrabox
            sudo kubectl rollout status deployment/infrabox-api -n infrabox --timeout=90s
        env:
          DOMAIN: ${{ secrets.INFRABOX_DOMAIN }}
