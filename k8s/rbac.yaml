apiVersion: v1
kind: ServiceAccount
metadata:
  name: infrabox-api
  namespace: infrabox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infrabox-api
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "services", "pods"]
    verbs: ["create", "get", "list", "delete", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "delete", "patch", "update"]
  - apiGroups: ["sshpiper.com"]
    resources: ["pipes"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infrabox-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: infrabox-api
subjects:
  - kind: ServiceAccount
    name: infrabox-api
    namespace: infrabox
