# Auth overlay for /v1/keys — applied only when oauth2-proxy is configured.
# Longer path prefix (/v1/keys) wins over the base ingress (/).
# Placeholders: API_DOMAIN_PLACEHOLDER, AUTH_DOMAIN_PLACEHOLDER
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infrabox-api-keys-auth
  namespace: infrabox
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "https://AUTH_DOMAIN_PLACEHOLDER/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://AUTH_DOMAIN_PLACEHOLDER/oauth2/start?rd=https%3A%2F%2F$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-Email,X-Auth-Request-User"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_clear_input_headers "X-Auth-Request-Email" "X-Auth-Request-User";
spec:
  ingressClassName: nginx
  rules:
    - host: API_DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /v1/keys
            pathType: Prefix
            backend:
              service:
                name: infrabox-api
                port:
                  number: 8080
