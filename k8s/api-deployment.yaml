apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrabox-api
  namespace: infrabox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infrabox-api
  template:
    metadata:
      labels:
        app: infrabox-api
    spec:
      serviceAccountName: infrabox-api
      containers:
        - name: api
          image: infrabox-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: INFRABOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: infrabox-api-secret
                  key: api-key
            - name: INFRABOX_INGRESS_IP
              valueFrom:
                secretKeyRef:
                  name: infrabox-api-secret
                  key: ingress-ip
            - name: INFRABOX_SSHPIPER_IP
              valueFrom:
                secretKeyRef:
                  name: infrabox-api-secret
                  key: sshpiper-ip
            - name: INFRABOX_INGRESS_DOMAIN
              value: "infrabox.example.com"
            - name: INFRABOX_STORAGE_CLASS
              value: "local-path"
            - name: INFRABOX_BASE_IMAGE
              value: "docker.io/library/infrabox-base:ubuntu-24.04"
            - name: INFRABOX_VM_NODE_SELECTOR
              value: ""
            - name: INFRABOX_RCLONE_DRIVE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rclone-oauth
                  key: client-id
                  optional: true
            - name: INFRABOX_RCLONE_DRIVE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rclone-oauth
                  key: client-secret
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: infrabox-api-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infrabox-api-data
  namespace: infrabox
spec:
  storageClassName: local-path
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: infrabox-api
  namespace: infrabox
spec:
  selector:
    app: infrabox-api
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
