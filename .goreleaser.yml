version: 2
project_name: ib

before:
  hooks:
    - sh -c "cd cli && go mod tidy"

builds:
  - id: ib
    dir: cli
    binary: ib
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/shogomuranushi/infrabox/cli/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: shogomuranushi
    name: infrabox
  extra_files:
    - glob: scripts/install.sh
